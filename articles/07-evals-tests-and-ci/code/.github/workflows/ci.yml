name: CI

on:
  push:
  pull_request:

jobs:
  # Fast, deterministic checks on every push/PR. No API key, no cost.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Unit tests
        run: pytest

  # Behavioral evals call the real model, so they run only when an API key secret is
  # available (e.g. on main, or manually). Gate on the secret so forks/PRs don't fail.
  evals:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: gpt-4.1   # cheaper/faster for CI evals
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run evals
        if: env.OPENAI_API_KEY != ''
        run: python -m evals.run
